name: Update iMenu status

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync iMenu status
        run: node server.js --sync-only

      - name: Commit updated status
        run: |
          if git diff --quiet -- imenu-status.json; then
            echo "No iMenu status changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add imenu-status.json
          git commit -m "Update iMenu status"
          git push
